services:
  postgres:
    image: postgres:16
    container_name: resora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: resora
      POSTGRES_USER: resora
      POSTGRES_PASSWORD: resora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
